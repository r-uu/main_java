version: '3.8'

services:
  jasperreports:
    build: ./jasperreports
    container_name: jasperreports-service
    ports:
      - "8090:8090"
    volumes:
      # Templates von Host mounten
      - ./jasperreports/templates:/app/templates:ro
      # Output-Verzeichnis für generierte Reports
      - ./jasperreports/output:/app/output
    environment:
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

