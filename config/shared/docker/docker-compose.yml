services:
  # ============================================================================
  # PostgreSQL Database - Single Instance for All Databases
  # Contains three schemas: jeeeraaah, lib_test, keycloak
  # Postgres superuser manages all schemas via init scripts
  # Uses credentials from .env: POSTGRES_*
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      # PostgreSQL superuser (manages all databases/schemas)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Default database (used for initial connection)
      POSTGRES_DB: postgres

      # Environment variables for init scripts
      # Schema: jeeeraaah
      POSTGRES_JEEERAAAH_DB: ${POSTGRES_JEEERAAAH_DB}
      POSTGRES_JEEERAAAH_USER: ${POSTGRES_JEEERAAAH_USER}
      POSTGRES_JEEERAAAH_PASSWORD: ${POSTGRES_JEEERAAAH_PASSWORD}

      # Schema: lib_test
      POSTGRES_LIB_TEST_DB: ${POSTGRES_LIB_TEST_DB}
      POSTGRES_LIB_TEST_USER: ${POSTGRES_LIB_TEST_USER}
      POSTGRES_LIB_TEST_PASSWORD: ${POSTGRES_LIB_TEST_PASSWORD}

      # Schema: keycloak
      POSTGRES_KEYCLOAK_DB: ${POSTGRES_KEYCLOAK_DB}
      POSTGRES_KEYCLOAK_USER: ${POSTGRES_KEYCLOAK_USER}
      POSTGRES_KEYCLOAK_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backups:/backups
      # Init scripts create all databases/users in alphabetical order
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # ============================================================================
  # Keycloak - Identity and Access Management
  # Provides authentication and authorization services
  # Uses credentials from .env: KEYCLOAK_ADMIN_* and POSTGRES_KEYCLOAK_*
  # Admin console: http://localhost:8080/admin
  # ============================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      # Admin credentials from .env (KEYCLOAK_ADMIN_*)
      # Used to access Keycloak Admin Console
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # Database configuration - connects to postgres container (keycloak schema)
      # Uses POSTGRES_KEYCLOAK_* credentials from .env
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}

      # Server configuration for development mode
      KC_HOSTNAME_STRICT: "false"           # Allow non-strict hostname checking
      KC_HTTP_ENABLED: "true"               # Enable HTTP (not just HTTPS)
      KC_PROXY: edge                        # Trust proxy headers
      KC_HEALTH_ENABLED: "true"             # Enable health endpoints
      KC_METRICS_ENABLED: "true"            # Enable metrics endpoints
    ports:
      - "8080:8080"
    volumes:
      # Keycloak data directory for theme/realm configuration persistence
      - keycloak-data:/opt/keycloak/data
      # Healthcheck script
      - ./healthcheck/keycloak-healthcheck.sh:/usr/local/bin/healthcheck.sh:ro
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: always

  # ============================================================================
  # JasperReports Service - Report Generation
  # Provides REST API for generating reports from JRXML templates
  # Templates are mounted from host filesystem (read-only)
  # Generated reports are stored in Docker volume
  # API: http://localhost:8090
  # ============================================================================
  jasperreports:
    build:
      context: ../../..
      dockerfile: root/lib/office/word/jasperreports/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: "localhost,127.0.0.1,*.local"
    container_name: jasperreports
    ports:
      - "8090:8090"
    volumes:
      # Templates directory (read-only) - contains JRXML report templates
      - ../../../root/sandbox/office/microsoft/word/jasperreports/templates:/app/templates:ro
      # Output directory for generated reports (DOCX, PDF, etc.)
      - jasperreports-output:/app/output
    environment:
      - PORT=8090                           # HTTP server port
      - JAVA_OPTS=-Xmx512m                  # JVM memory limit
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always

networks:
  ruu-network:
    driver: bridge
    name: ruu-network

volumes:
  # ============================================================================
  # Persistent Volumes
  # ============================================================================

  # PostgreSQL Database Volumes (single instance with multiple schemas)
  postgres-data:
    name: postgres-data                    # All database files (jeeeraaah, lib_test, keycloak)
  postgres-backups:
    name: postgres-backups                 # Backup storage for all databases

  # Keycloak Application Data
  keycloak-data:
    name: keycloak-data                    # Keycloak themes, realms, and configuration

  # JasperReports Generated Output
  jasperreports-output:
    name: jasperreports-output             # Generated DOCX, PDF reports

# ═══════════════════════════════════════════════════════════════════
# Hinweise
# ═══════════════════════════════════════════════════════════════════
#
# CREDENTIALS:
# Alle Credentials werden aus der .env Datei geladen!
# Siehe: .env.template für die Struktur
#
# PostgreSQL (Port 5432):
#   Superuser: ${POSTGRES_USER}:${POSTGRES_PASSWORD}
#
#   Schema jeeeraaah:
#     Database: ${POSTGRES_JEEERAAAH_DB}
#     User:     ${POSTGRES_JEEERAAAH_USER}
#     Password: ${POSTGRES_JEEERAAAH_PASSWORD}
#
#   Schema lib_test:
#     Database: ${POSTGRES_LIB_TEST_DB}
#     User:     ${POSTGRES_LIB_TEST_USER}
#     Password: ${POSTGRES_LIB_TEST_PASSWORD}
#
#   Schema keycloak:
#     Database: ${POSTGRES_KEYCLOAK_DB}
#     User:     ${POSTGRES_KEYCLOAK_USER}
#     Password: ${POSTGRES_KEYCLOAK_PASSWORD}
#
# Keycloak Admin Console (http://localhost:8080/admin):
#   Username: ${KEYCLOAK_ADMIN_USER}
#   Password: ${KEYCLOAK_ADMIN_PASSWORD}
#
# Init-Skripte:
#   Alle SQL-Dateien in ./initdb/ werden automatisch ausgeführt
#   Ausführung beim ersten Start (alphabetisch sortiert)
#
# Rebuild (Daten löschen):
#   docker compose down -v
#   docker volume rm postgres-data keycloak-data
#   docker compose up -d
#
# Einzelnen Container neu starten:
#   docker compose restart <container-name>

