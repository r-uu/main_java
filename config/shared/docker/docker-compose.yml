
services:
  # ═══════════════════════════════════════════════════════════════════
  # PostgreSQL für JEEERAaH Application
  # ═══════════════════════════════════════════════════════════════════
  postgres-jeeeraaah:
    image: postgres:16-alpine
    container_name: postgres-jeeeraaah
    environment:
      POSTGRES_DB: jeeeraaah
      POSTGRES_USER: r_uu
      POSTGRES_PASSWORD: r_uu_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-jeeeraaah-data:/var/lib/postgresql/data
      - postgres-jeeeraaah-backups:/backups
      - ./initdb/jeeeraaah:/docker-entrypoint-initdb.d:ro
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r_uu -d jeeeraaah"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # PostgreSQL für Keycloak
  # ═══════════════════════════════════════════════════════════════════
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: r_uu
      POSTGRES_PASSWORD: r_uu_password
    ports:
      - "5433:5432"  # Anderer externer Port, intern weiterhin 5432
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
      - postgres-keycloak-backups:/backups
      - ./initdb/keycloak:/docker-entrypoint-initdb.d:ro
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r_uu -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════
  # Keycloak - Identity and Access Management
  # ═══════════════════════════════════════════════════════════════════
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-service
    environment:
      # Admin Credentials
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      # Database Configuration - Eigene PostgreSQL-Instanz
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: r_uu
      KC_DB_PASSWORD: r_uu_password

      # Server Configuration
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    command: start-dev
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # JasperReports Service - Isolierte Report-Generierung
  jasperreports:
    build:
      context: ../../..  # Root-Verzeichnis (enthält bom/ und root/)
      dockerfile: root/sandbox/office/microsoft/word/jasperreports/Dockerfile
    container_name: jasperreports-service
    ports:
      - "8090:8090"
    volumes:
      # Templates werden im Build kopiert, hier optional für Live-Updates
      - ../../../root/sandbox/office/microsoft/word/jasperreports/templates:/app/templates:ro
      # Output-Verzeichnis für generierte Reports
      - ../../../root/sandbox/office/microsoft/word/jasperreports/server/output:/app/output
    environment:
      - JAVA_OPTS=-Xmx512m
    networks:
      - ruu-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  ruu-network:
    driver: bridge
    name: ruu-network

volumes:
  # Volumes für JEEERAaH PostgreSQL
  postgres-jeeeraaah-data:
    name: postgres-jeeeraaah-data
  postgres-jeeeraaah-backups:
    name: postgres-jeeeraaah-backups

  # Volumes für Keycloak PostgreSQL
  postgres-keycloak-data:
    name: postgres-keycloak-data
  postgres-keycloak-backups:
    name: postgres-keycloak-backups

# ═══════════════════════════════════════════════════════════════════
# Hinweise
# ═══════════════════════════════════════════════════════════════════
#
# SEPARATE DATENBANKEN:
# - postgres-jeeeraaah: Für JEEERAaH Application (Port 5432)
# - postgres-keycloak:  Für Keycloak (Port 5433)
#
# CREDENTIALS (beide identisch):
#   User:     r_uu
#   Password: r_uu_password
#
# PostgreSQL Zugriff JEEERAaH:
#   Host:     localhost
#   Port:     5432
#   User:     r_uu
#   Password: r_uu_password
#   Database: jeeeraaah
#
# PostgreSQL Zugriff Keycloak:
#   Host:     localhost
#   Port:     5433
#   User:     r_uu
#   Password: r_uu_password
#   Database: keycloak
#
# Keycloak Admin Console: http://localhost:8080/admin
# Standard Login: admin / admin (ändern via KEYCLOAK_ADMIN_PASSWORD!)
#
# Init-Skripte:
#   JEEERAaH: Lege SQL in ./initdb/jeeeraaah/ ab
#   Keycloak: Lege SQL in ./initdb/keycloak/ ab
#   Ausführung beim ersten Start automatisch (alphabetisch sortiert)
#
# Rebuild (Daten löschen):
#   docker compose down -v
#   docker volume rm postgres-jeeeraaah-data postgres-keycloak-data
#   docker compose up -d
#
# Einzelnen Container neu starten:
#   docker compose restart postgres-jeeeraaah
#   docker compose restart postgres-keycloak

