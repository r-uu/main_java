# ============================================================================
# MicroProfile Config for Jeeeraaah Frontend UI FX
# ============================================================================
# Properties are injected by Maven resource filtering from config.properties
# See: r-uu/config.properties (machine-specific, git-ignored)
# ============================================================================

# ------------------------------------------------------------------------------
# Testing Mode
# ------------------------------------------------------------------------------
testing.enabled=true
testing=true

# Testing credentials (legacy property names - deprecated, use keycloak.test.* instead)
testing.username=${test_username:test}
testing.password=${test_password:test}

# Path to the writable config file (optional, for runtime modifications)
# Relative to project root (../../.. from frontend/ui/fx)
# Or set via System Property: -Dconfig.file.name=testing.properties
config.file.name=../../../testing.properties

# ------------------------------------------------------------------------------
# PostgreSQL - JEEERAaH Database (Schema in gemeinsamem Container)
# User/Password: jeeeraaah/jeeeraaah
# ------------------------------------------------------------------------------
db.jeeeraaah.host=localhost
db.jeeeraaah.port=5432
db.jeeeraaah.name=jeeeraaah
db.jeeeraaah.database=jeeeraaah
db.jeeeraaah.username=jeeeraaah
db.jeeeraaah.user=jeeeraaah
db.jeeeraaah.password=jeeeraaah
db.jeeeraaah.url=jdbc:postgresql://localhost:5432/jeeeraaah

# ------------------------------------------------------------------------------
# PostgreSQL - lib_test Database (Schema in gemeinsamem Container)
# For Unit-/Integration tests
# User/Password: lib_test/lib_test
# ------------------------------------------------------------------------------
db.lib_test.host=localhost
db.lib_test.port=5432
db.lib_test.name=lib_test
db.lib_test.database=lib_test
db.lib_test.username=lib_test
db.lib_test.user=lib_test
db.lib_test.password=lib_test
db.lib_test.url=jdbc:postgresql://localhost:5432/lib_test
db.lib_test.persistence.unit.name=lib_test

# Legacy Properties (for old code locations that still use these names)
database.host=localhost
database.port=5432
database.name=lib_test
database.user=lib_test
database.password=lib_test

# ------------------------------------------------------------------------------
# Keycloak Server
# ------------------------------------------------------------------------------
keycloak.url=http://localhost:8080
keycloak.realm=jeeeraaah-realm
keycloak.admin.user=admin
keycloak.admin.username=admin
keycloak.admin.password=admin

# Keycloak Client Configuration
keycloak.client.id=jeeeraaah-frontend
keycloak.client.secret=

# Keycloak Test User (for automatic login in testing mode)
# IMPORTANT: These credentials must match the user created in the jeeeraaah-realm
# User/Password: test/test
keycloak.test.user=test
keycloak.test.password=test

mp.jwt.verify.publickey.location=http://localhost:8080/realms/jeeeraaah-realm/protocol/openid-connect/certs
mp.jwt.verify.issuer=http://localhost:8080/realms/jeeeraaah-realm
mp.jwt.verify.audiences=jeeeraaah-backend

# ------------------------------------------------------------------------------
# Service URLs
# ------------------------------------------------------------------------------
service.backend.url=http://localhost:9080/jeeeraaah
service.jasperreports.url=http://localhost:8090

# ------------------------------------------------------------------------------
# JasperReports Service (Legacy)
# ------------------------------------------------------------------------------
jasperreports.service.url=http://localhost:8090

# ------------------------------------------------------------------------------
# Liberty Application Server
# ------------------------------------------------------------------------------
liberty.http.port=9080
liberty.https.port=9443

