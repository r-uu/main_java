<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <style>
      .timeline { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .era-box { fill: #F0F8FF; stroke: #4682B4; stroke-width: 2; }
      .monolith { fill: #D2B48C; stroke: #8B7355; stroke-width: 2; }
      .microservice { fill: #90EE90; stroke: #228B22; stroke-width: 1.5; }
      .module { fill: #FFE4B5; stroke: #DEB887; stroke-width: 1.5; }
      .problem { fill: #FFB6C1; stroke: #DC143C; stroke-width: 2; }
      .solution { fill: #98FB98; stroke: #228B22; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .year { font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="title">Evolution der Software-Architekturen</text>

  <!-- Timeline -->
  <path d="M 50 200 L 850 200" class="timeline"/>

  <!-- PHASE 1: MONOLITHEN (2000-2010) -->
  <rect x="70" y="50" width="200" height="280" class="era-box" rx="10"/>
  <text x="170" y="75" class="subtitle">2000-2010</text>
  <text x="170" y="95" class="year">Monolithen</text>

  <!-- Big monolith -->
  <rect x="100" y="110" width="140" height="100" class="monolith" rx="5"/>
  <text x="170" y="145" class="text">Ein großer</text>
  <text x="170" y="165" class="text">Monolith</text>
  <text x="170" y="190" class="label">(Alles in einem)</text>

  <!-- Problem -->
  <rect x="85" y="230" width="170" height="50" class="problem" rx="5"/>
  <text x="170" y="250" class="text" font-weight="bold">Problem:</text>
  <text x="170" y="265" class="label">Big Ball of Mud</text>
  <text x="170" y="278" class="label">Wartung unmöglich</text>

  <text x="170" y="310" class="label">✓ Einfaches Deployment</text>
  <text x="170" y="323" class="label">✗ Keine Modularisierung</text>

  <!-- PHASE 2: MICROSERVICES (2010-2020) -->
  <rect x="340" y="50" width="200" height="280" class="era-box" rx="10"/>
  <text x="440" y="75" class="subtitle">2010-2020</text>
  <text x="440" y="95" class="year">Microservices</text>

  <!-- Many microservices -->
  <rect x="360" y="110" width="50" height="35" class="microservice" rx="3"/>
  <text x="385" y="130" class="label">MS-A</text>

  <rect x="420" y="110" width="50" height="35" class="microservice" rx="3"/>
  <text x="445" y="130" class="label">MS-B</text>

  <rect x="480" y="110" width="50" height="35" class="microservice" rx="3"/>
  <text x="505" y="130" class="label">MS-C</text>

  <rect x="360" y="155" width="50" height="35" class="microservice" rx="3"/>
  <text x="385" y="175" class="label">MS-D</text>

  <rect x="420" y="155" width="50" height="35" class="microservice" rx="3"/>
  <text x="445" y="175" class="label">MS-E</text>

  <rect x="480" y="155" width="50" height="35" class="microservice" rx="3"/>
  <text x="505" y="175" class="label">MS-F</text>

  <!-- Network lines -->
  <line x1="410" y1="127" x2="420" y2="127" stroke="#666" stroke-width="1"/>
  <line x1="470" y1="127" x2="480" y2="127" stroke="#666" stroke-width="1"/>
  <line x1="410" y1="172" x2="420" y2="172" stroke="#666" stroke-width="1"/>
  <line x1="470" y1="172" x2="480" y2="172" stroke="#666" stroke-width="1"/>
  <line x1="385" y1="145" x2="385" y2="155" stroke="#666" stroke-width="1"/>
  <line x1="445" y1="145" x2="445" y2="155" stroke="#666" stroke-width="1"/>

  <!-- Problem -->
  <rect x="355" y="230" width="170" height="50" class="problem" rx="5"/>
  <text x="440" y="250" class="text" font-weight="bold">Problem:</text>
  <text x="440" y="265" class="label">Infrastruktur-Komplexität</text>
  <text x="440" y="278" class="label">Latenz, Konsistenz</text>

  <text x="440" y="310" class="label">✓ Starke Modularisierung</text>
  <text x="440" y="323" class="label">✗ Komplexe Infrastruktur</text>

  <!-- PHASE 3: MODULITHEN (2020+) -->
  <rect x="610" y="50" width="220" height="280" class="era-box" rx="10"/>
  <text x="720" y="75" class="subtitle">2020+</text>
  <text x="720" y="95" class="year">Modulithen</text>

  <!-- Modulith (monolith with modules) -->
  <rect x="635" y="110" width="170" height="100" class="monolith" rx="5"/>

  <!-- Modules inside -->
  <rect x="650" y="125" width="45" height="30" class="module" rx="3"/>
  <text x="672" y="143" class="label">Mod-A</text>

  <rect x="705" y="125" width="45" height="30" class="module" rx="3"/>
  <text x="727" y="143" class="label">Mod-B</text>

  <rect x="760" y="125" width="45" height="30" class="module" rx="3"/>
  <text x="782" y="143" class="label">Mod-C</text>

  <rect x="650" y="165" width="45" height="30" class="module" rx="3"/>
  <text x="672" y="183" class="label">Mod-D</text>

  <rect x="705" y="165" width="45" height="30" class="module" rx="3"/>
  <text x="727" y="183" class="label">Mod-E</text>

  <rect x="760" y="165" width="45" height="30" class="module" rx="3"/>
  <text x="782" y="183" class="label">Mod-F</text>

  <!-- Solution -->
  <rect x="625" y="230" width="190" height="50" class="solution" rx="5"/>
  <text x="720" y="250" class="text" font-weight="bold">Lösung:</text>
  <text x="720" y="265" class="label">Best of both worlds!</text>
  <text x="720" y="278" class="label">JPMS-Module</text>

  <text x="720" y="310" class="label">✓ Einfaches Deployment</text>
  <text x="720" y="323" class="label">✓ Starke Modularisierung</text>

  <!-- Timeline markers -->
  <circle cx="170" cy="200" r="5" fill="#333"/>
  <text x="170" y="220" class="year">2000</text>

  <circle cx="440" cy="200" r="5" fill="#333"/>
  <text x="440" y="220" class="year">2010</text>

  <circle cx="720" cy="200" r="5" fill="#333"/>
  <text x="720" y="220" class="year">2020</text>

  <!-- Bottom note -->
  <text x="450" y="380" class="text" font-style="italic">Die Evolution zu wartbaren, skalierbaren Architekturen</text>
</svg>

