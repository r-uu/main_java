<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .box { fill: #E6E6FA; stroke: #6A5ACD; stroke-width: 2; }
      .fast { stroke: #228B22; stroke-width: 3; fill: none; marker-end: url(#arrowhead-green); }
      .slow { stroke: #DC143C; stroke-width: 3; fill: none; marker-end: url(#arrowhead-red); }
      .process-boundary { stroke: #999; stroke-width: 2; stroke-dasharray: 10,5; fill: none; }
      .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 10px; text-anchor: middle; }
      .highlight { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; }
    </style>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#228B22"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#DC143C"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" class="title">Latenz-Problem bei Microservices</text>

  <!-- TOP: MONOLITH (In-Process) -->
  <text x="400" y="70" class="subtitle">Monolith: In-Process Methodenaufruf</text>

  <!-- Process boundary -->
  <rect x="50" y="85" width="700" height="120" class="process-boundary" rx="10"/>
  <text x="400" y="100" class="label">Ein Betriebssystemprozess</text>

  <!-- Service boxes -->
  <rect x="100" y="120" width="120" height="60" class="box" rx="5"/>
  <text x="160" y="145" class="text">Service A</text>
  <text x="160" y="165" class="label">methodCall()</text>

  <rect x="580" y="120" width="120" height="60" class="box" rx="5"/>
  <text x="640" y="145" class="text">Service B</text>
  <text x="640" y="165" class="label">methodExecute()</text>

  <!-- Fast arrow -->
  <path d="M 220 150 L 580 150" class="fast"/>
  <text x="400" y="140" class="highlight" fill="#228B22">~1-10 Nanosekunden</text>

  <!-- BOTTOM: MICROSERVICES (Network) -->
  <text x="400" y="250" class="subtitle">Microservices: HTTP/REST Call über Netzwerk</text>

  <!-- Process 1 boundary -->
  <rect x="50" y="265" width="280" height="200" class="process-boundary" rx="10"/>
  <text x="190" y="280" class="label">Prozess 1</text>

  <!-- Process 2 boundary -->
  <rect x="470" y="265" width="280" height="200" class="process-boundary" rx="10"/>
  <text x="610" y="280" class="label">Prozess 2</text>

  <!-- Service boxes -->
  <rect x="90" y="300" width="200" height="60" class="box" rx="5"/>
  <text x="190" y="325" class="text">Service A</text>
  <text x="190" y="345" class="label">httpClient.post(...)</text>

  <rect x="510" y="385" width="200" height="60" class="box" rx="5"/>
  <text x="610" y="410" class="text">Service B</text>
  <text x="610" y="430" class="label">@PostMapping(...)</text>

  <!-- Slow arrow with steps -->
  <path d="M 290 330 L 510 415" class="slow"/>

  <!-- Steps labels -->
  <text x="320" y="310" class="label" fill="#DC143C">1. Serialisierung (JSON)</text>
  <text x="340" y="340" class="label" fill="#DC143C">2. HTTP Request</text>
  <text x="380" y="365" class="label" fill="#DC143C">3. Netzwerk-Übertragung</text>
  <text x="440" y="390" class="label" fill="#DC143C">4. HTTP Response</text>
  <text x="470" y="420" class="label" fill="#DC143C">5. Deserialisierung</text>

  <text x="400" y="475" class="highlight" fill="#DC143C">~1-100 Millisekunden</text>

  <!-- Comparison box -->
  <rect x="650" y="10" width="140" height="70" fill="#FFF9E6" stroke="#FFD700" stroke-width="2" rx="5"/>
  <text x="720" y="30" class="text" font-weight="bold">Faktor:</text>
  <text x="720" y="50" class="highlight" font-size="18" fill="#DC143C">~1.000.000×</text>
  <text x="720" y="70" class="label">langsamer!</text>
</svg>

